name: core_app
description: initial_project_mobile asosidagi Clean Architecture Flutter starter
version: 0.1.0+1

environment:
  mason: ">=0.1.0 <0.2.0"

vars:
  project_name:
    type: string
    description: Dart package nomi (snake_case)
    default: my_app
    prompt: "Loyiha nomi (dart package, snake_case)?"
  application_id:
    type: string
    description: Android applicationId / namespace
    default: io.udevs.initial_project
    prompt: "Package name (masalan: io.udevs.my_app)?"
